  <text x="885" y="345" text-anchor="middle" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="500" font-size="86" letter-spacing="-2">Squarespace</text>
  <circle cx="600" cy="315" r="56" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
