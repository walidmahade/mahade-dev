  <circle cx="90" cy="90" r="10" fill="#4353FF"/>
  <text x="120" y="98" fill="#0B0D13" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="600" font-size="22">Mahade Walid</text>
