  <text x="90" y="380" fill="#4353FF" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="500" font-size="56" letter-spacing="-1">for agencies that ship.</text>
  <text x="90" y="480" fill="#4B5261" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="400" font-size="28">Unlimited pages. Flat monthly rate. Hourly on Upwork.</text>
  <text x="90" y="570" fill="#8A90A0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="500" font-size="20" letter-spacing="2">MAHADE.DEV</text>
